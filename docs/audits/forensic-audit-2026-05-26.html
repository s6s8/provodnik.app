const STATUS_ORDER = ["DELIVERED-WRONG", "PARTIAL", "PROMISED-LOST", "ABORTED-EPIC", "DIAGNOSTIC-ONLY", "KILLED", "SUBSUMED", "DELIVERED"];
const STATUS_TOKEN = {"DELIVERED": "ok", "DELIVERED-WRONG": "warn", "PARTIAL": "warn", "DIAGNOSTIC-ONLY": "info", "PROMISED-LOST": "err", "ABORTED-EPIC": "err", "KILLED": "mute", "SUBSUMED": "mute", "UNKNOWN": "mute"};

let activeStatus = 'all';
let query = '';

function badgeClass(status) {
  const t = STATUS_TOKEN[status] || 'mute';
  return 'b-' + t;
}
function fmtDate(s) { return (s || '').slice(0, 10) || ''; }

function render() {
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const q = query.toLowerCase();
  const filtered = ITEMS.filter(it => {
    if (activeStatus !== 'all' && it.status !== activeStatus) return false;
    if (q && !( (it.title || '').toLowerCase().includes(q) || (it.id || '').toLowerCase().includes(q) || (it.source || '').toLowerCase().includes(q) )) return false;
    return true;
  });
  list.innerHTML = filtered.map(it => `
    <div class="card" onclick="this.classList.toggle('open')">
      <div class="row1">
        <p class="title">${escapeHtml(it.title)}</p>
        <span class="badge ${badgeClass(it.status)}">${it.status}</span>
      </div>
      <div class="meta">
        <span>${escapeHtml(it.id)}</span>
        <span>·</span>
        <span>${escapeHtml(it.source || '')}</span>
        ${it.sha ? `<span>·</span><code>${escapeHtml(it.sha)}</code>` : ''}
        ${it.date ? `<span>·</span><span>${fmtDate(it.date)}</span>` : ''}
      </div>
      <div class="detail">
        ${it.rationale ? `<div class="lbl">Rationale</div><div class="blk">${escapeHtml(it.rationale)}</div>` : ''}
        ${it.evidence ? `<div class="lbl">Evidence</div><div class="blk">${escapeHtml(it.evidence)}</div>` : ''}
        ${it.why ? `<div class="lbl">Why missed</div><div class="blk">${escapeHtml(it.why)}</div>` : ''}
        ${it.followup ? `<div class="lbl">Follow-up</div><div class="blk">${escapeHtml(it.followup)}</div>` : ''}
        ${it.files && it.files.length ? `<div class="lbl">Files (${it.file_count})</div><div class="blk">${it.files.map(escapeHtml).join('\n')}${it.file_count > 5 ? '\n…' : ''}</div>` : ''}
        ${it.ac && it.ac.length ? `<div class="lbl">Acceptance criteria</div><div class="blk">${it.ac.map((c, i) => (i+1) + '. ' + escapeHtml(c)).join('\n')}</div>` : ''}
      </div>
    </div>
  `).join('');
  empty.style.display = filtered.length ? 'none' : 'block';
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function buildChips() {
  const chips = document.getElementById('chips');
  const counts = {};
  ITEMS.forEach(it => { counts[it.status] = (counts[it.status] || 0) + 1; });
  const all = ['all', ...STATUS_ORDER.filter(s => counts[s])];
  chips.innerHTML = all.map(s => {
    const n = s === 'all' ? ITEMS.length : counts[s];
    const active = s === activeStatus ? ' active' : '';
    const label = s === 'all' ? 'All' : s;
    return `<span class="chip${active}" data-s="${s}"><span>${label}</span><span class="n">${n}</span></span>`;
  }).join('');
  chips.querySelectorAll('.chip').forEach(el => {
    el.onclick = () => {
      activeStatus = el.dataset.s;
      buildChips();
      render();
    };
  });
}

document.getElementById('q').addEventListener('input', e => {
  query = e.target.value;
  render();
});

buildChips();
render();
</script>
